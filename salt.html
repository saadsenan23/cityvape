<script>
const searchInput = document.getElementById("searchInput");
const searchBtn = document.getElementById("searchBtn");
const products = document.querySelectorAll(".product");
const noResults = document.getElementById("noResults");

searchBtn.addEventListener("click", function () {
  const value = searchInput.value.toLowerCase();
  let found = false;

  products.forEach(function (product) {
    const name = product.querySelector("h3").innerText.toLowerCase();

    if (name.includes(value)) {
      product.style.display = "";
      found = true;
    } else {
      product.style.display = "none";
    }
  });

  if (!found) {
    noResults.style.display = "block";
  } else {
    noResults.style.display = "none";
  }
});
</script>


<script>
document.addEventListener("DOMContentLoaded", function () {

  const ageBox = document.getElementById("age-warning");
  const acceptBtn = document.getElementById("acceptBtn");

  if (acceptBtn) {
    acceptBtn.addEventListener("click", function () {
      localStorage.setItem("acceptBtn", "yes");
      ageBox.style.display = "none";
    });
  }

  if (false) {
    ageBox.style.display = "none";
  }

});

const slides = document.querySelectorAll('.slide');
let current = 0;

document.getElementById('next').addEventListener('click', () => {
  slides[current].classList.remove('active');
  current = (current + 1) % slides.length;
  slides[current].classList.add('active');
});

document.getElementById('prev').addEventListener('click', () => {
  slides[current].classList.remove('active');
  current = (current - 1 + slides.length) % slides.length;
  slides[current].classList.add('active');
});
</script>
<script>
  const menuBtn = document.getElementById("menu-btn");
  const sideMenu = document.getElementById("side-menu");
  const liquidToggle = document.querySelector(".submenu-toggle");
  const submenu = document.querySelector(".submenu");

  menuBtn.addEventListener("click", () => {
    sideMenu.classList.toggle("open");
  });

  liquidToggle.addEventListener("click", () => {
    submenu.style.display =
      submenu.style.display === "block" ? "none" : "block";
  });
  const directionBtn = document.getElementById("direction-btn");
const directionBox = document.getElementById("direction-box");

directionBtn.addEventListener("click", () => {
  if (directionBox.style.display === "none" || directionBox.style.display === "") {
    directionBox.style.display = "block";  // يظهر الصندوق
  } else {
    directionBox.style.display = "none";   // يخفي الصندوق
  }
});
const contactBtn = document.getElementById("contact-btn");
const contactBox = document.getElementById("contact-box");

contactBtn.addEventListener("click", () => {
  if (contactBox.style.display === "none" || contactBox.style.display === "") {
    contactBox.style.display = "block"; // يظهر الصندوق
  } else {
    contactBox.style.display = "none";  // يخفي الصندوق
  }
});
</script>
